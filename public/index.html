<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#0a0c0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BeamPi">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <title>BeamPi · Projektionssteuerung</title>
  <script>
    // Theme vor dem ersten Rendern setzen, damit nichts aufblitzt
    if (localStorage.getItem('beampi-theme') === 'light') {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0c0f'/%3E%3Ccircle cx='13' cy='16' r='7' fill='none' stroke='%23ffb02e' stroke-width='2.5'/%3E%3Ccircle cx='13' cy='16' r='2.5' fill='%23ffb02e'/%3E%3Cpath d='M22 12l7 4-7 4z' fill='%23ffb02e'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="beam-glow" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="#/">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="13" cy="16" r="7" fill="none" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="13" cy="16" r="2.5" fill="currentColor"/>
        <path d="M22 12l7 4-7 4z" fill="currentColor"/>
      </svg>
      <span class="brand-name">BEAM<em>PI</em></span>
    </a>
    <nav class="topnav">
      <a href="#/" data-nav="dashboard">Dashboard</a>
      <a href="#/settings" data-nav="settings">Einstellungen</a>
    </nav>
    <div class="lamp lamp--idle" id="lamp" title="Player-Status">
      <span class="lamp-dot"></span>
      <span class="lamp-text" id="lamp-text">STANDBY</span>
    </div>
    <button class="icon-btn theme-toggle" id="theme-toggle" title="Hell/Dunkel umschalten" aria-label="Hell/Dunkel umschalten">☀</button>
    <button class="icon-btn theme-toggle" id="logout-btn" title="Abmelden" aria-label="Abmelden" hidden>⏻</button>
  </header>

  <main id="app" class="view"></main>

  <footer class="footer">
    <span class="mono">BeamPi v1.18.3</span>
    <span class="footer-sep">·</span>
    <span id="footer-info" class="mono"></span>
  </footer>

  <!-- Video-Vorschau -->
  <div class="modal-backdrop hidden" id="preview-modal" role="dialog" aria-modal="true">
    <div class="modal preview-dialog">
      <div class="modal-head">
        <h3 class="mono" id="preview-title">Vorschau</h3>
        <button class="icon-btn" id="preview-close" aria-label="Schließen">✕</button>
      </div>
      <video id="preview-video" controls autoplay playsinline></video>
    </div>
  </div>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
